version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: axis-postgres
    environment:
      POSTGRES_DB: axis_academy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4488
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: axis-server
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: axis_academy
      DB_USER: postgres
      DB_PASSWORD: 4488
      PORT: 5000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: axis-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
